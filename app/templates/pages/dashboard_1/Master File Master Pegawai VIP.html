<!-- pages/dashboard_1/Master File Master Pegawai VIP.html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- VIP List{% endblock %}

{% block content %}
<div class="nxl-content" style="display: block !important; height: auto !important;">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="Master_Data_Tim_Siaga.html">VIP List</a></li>
                <li class="breadcrumb-item">Edit</li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0">
                        <i class="ti ti-vip me-2"></i> Pegawai VIP
                    </h6>
                    <div class="header-actions d-flex gap-3">
                        <button class="btn p-0 border-0 bg-transparent shadow-none">
                            <i class="bi bi-save" style="color: #198754; font-size: 1.2rem;"></i>
                        </button>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-3 mb-3">
                        <div
                            class="col-md-12 d-flex flex-column flex-md-row align-items-start align-items-md-center flex-wrap gap-2">
                            <label class="filter-label-wide fw-bold">Unit</label>

                            <div class="flex-grow-1" style="max-width: 70%;">
                                <select class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih Kategori</option>
                                    <option>Surabaya</option>
                                    <option>Jember</option>
                                    <option>Trenggalek</option>
                                    <option>Banyuwangi</option>
                                    <option>Sumenep</option>
                                    <option>Bojonegoro</option>
                                    <option>Malang</option>
                                    <option>KN Widura</option>
                                    <option>KN Srikandi</option>
                                    <option>KN Permadi</option>
                                    <option>Security</option>
                                    <option>Pramubakti</option>
                                    <option>ABK Honorer</option>
                                    <option>CPNS</option>
                                    <option>PPNPN</option>
                                    <option>ABK PPNPN</option>
                                    <option>Rescuer PPNPN</option>
                                    <option>PPPK</option>
                                    <option>PPPK Paruh Waktu</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div
                            class="col-md-12 d-flex flex-column flex-md-row align-items-start align-items-md-center flex-wrap gap-2">
                            <label class="filter-label-wide fw-bold">Filter</label>

                            <select class="form-select-sm border custom-select w-mobile-100">
                                <option>- Pilih Field -</option>
                                <option>Gol</option>
                                <option>Jabatan</option>
                                <option>Jenis Kelamin</option>
                                <option>Nama Peg</option>
                                <option>NIP</option>
                                <option>No Finger</option>
                                <option>Unit Kerja</option>
                            </select>

                            <div class="input-group-custom w-mobile-100">
                                <input type="text" class="form-control-sm border">
                                <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                            </div>

                            <span class="mx-md-2 fw-bold text-dan">Dan</span>

                            <select class="form-select-sm border custom-select w-mobile-100">
                                <option>- Pilih Field -</option>
                                <option>Gol</option>
                                <option>Jabatan</option>
                                <option>Jenis Kelamin</option>
                                <option>Nama Peg</option>
                                <option>NIP</option>
                                <option>No Finger</option>
                                <option>Unit Kerja</option>
                            </select>

                            <div class="input-group-custom w-mobile-100">
                                <input type="text" class="form-control-sm border">
                                <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                            </div>

                            <button class="btn-refresh-custom ms-md-auto mt-2 mt-md-0 w-mobile-100">
                                <i class="bi bi-arrow-clockwise"></i> Refresh
                            </button>
                        </div>
                    </div>

                    <div class="table-responsive mt-3">
                        <table class="table table-bordered table-striped text-center align-middle">
                            <thead style="background:#EB6831;">
                                <tr>
                                    <th style="color:white; vertical-align: middle;">No</th>
                                    <th style="color:white; vertical-align: middle;">VIP</th>
                                    <th style="color:white; vertical-align: middle;">Nama</th>
                                    <th style="color:white; vertical-align: middle;">Jabatan</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="4" style="vertical-align: middle; padding: 20px;">No records to
                                        display.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div style="height: 120px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}

{% endblock %}
