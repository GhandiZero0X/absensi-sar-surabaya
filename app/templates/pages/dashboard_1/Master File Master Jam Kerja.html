<!-- pages/dashboard_1/Master File Master Jam Kerja.html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- Jam Kerja{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('main.view_master_jam_kerja') }}">Master Jam Kerja</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0">
                        <i class="ti ti-clock-edit me-2"></i> Master Jam Kerja
                    </h6>

                    <div class="header-actions">
                        <button class="btn p-0 border-0 bg-transparent shadow-none d-md-none" type="button"
                            data-bs-toggle="collapse" data-bs-target="#headerIconsCollapse">
                            <i class="bi bi-three-dots-vertical" style="font-size: 1.5rem; color: #333;"></i>
                        </button>

                        <div class="collapse d-md-flex align-items-center" id="headerIconsCollapse">
                            <div class="header-icons-wrapper d-flex gap-3 p-2 p-md-0 mt-2 mt-md-0">
                                <a href="{{ url_for('main.view_cari_master_jam_kerja') }}"
                                    class="btn p-0 border-0 bg-transparent shadow-none text-decoration-none">
                                    <i class="bi bi-search" style="color: #333; font-size: 1.1rem;"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Shift</label>
                            <div class="col-md-7">
                                <select id="selectShift" class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Penggantian TLM 1</label>
                            <div class="col-md-7">
                                <select id="selectPenggantianTlm1" class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    <option value="1">Ada Penggantian (Y)</option>
                                    <option value="0">Tidak Ada Penggantian (N)</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Tanggal Mulai</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="date" id="inputTglMulai" class="form-control-sm border w-100" style="outline: none;">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Hari Kerja</label>
                            <div class="col-md-7">
                                <div class="d-flex gap-4 align-items-center">
                                    <div class="form-check d-flex align-items-center gap-2 mb-0">
                                        <input class="form-check-input" type="radio" name="hari_kerja" id="seninKamis"
                                            value="1" checked>
                                        <label class="form-check-label" for="seninKamis">
                                            (1).Senin-Kamis
                                        </label>
                                    </div>
                                    <div class="form-check d-flex align-items-center gap-2 mb-0">
                                        <input class="form-check-input" type="radio" name="hari_kerja" id="jumat"
                                            value="2">
                                        <label class="form-check-label" for="jumat">
                                            (2).Jum'at
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Jam Masuk</label>
                            <div class="col-md-7">
                                <div style="display: flex; align-items: center; gap: 5px;">
                                    <input type="time" id="inputJamMasuk" class="form-control-sm border"
                                        style="width: 150px; outline: none;">
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Jam Pulang</label>
                            <div class="col-md-7">
                                <div style="display: flex; align-items: center; gap: 5px;">
                                    <input type="time" id="inputJamPulang" class="form-control-sm border"
                                        style="width: 150px; outline: none;">
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-flex justify-content-center mt-3">
                            <button type="button" id="btnSimpanJamKerja" class="btn btn-orange-figma px-4">
                                <i class="bi bi-save me-1"></i>Simpan
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
document.getElementById('btnSimpanJamKerja').addEventListener('click', function () {
    const shift = document.getElementById('selectShift').value;
    const penggantianTlm1 = document.getElementById('selectPenggantianTlm1').value;
    const tglMulai = document.getElementById('inputTglMulai').value;
    const hariKerja = document.querySelector('input[name="hari_kerja"]:checked')
        ? document.querySelector('input[name="hari_kerja"]:checked').value
        : '';
    const jamMasuk = document.getElementById('inputJamMasuk').value;
    const jamPulang = document.getElementById('inputJamPulang').value;

    if (!shift) {
        alert('Shift wajib dipilih');
        return;
    }
    if (penggantianTlm1 === '') {
        alert('Penggantian TLM 1 wajib dipilih');
        return;
    }
    if (!tglMulai) {
        alert('Tanggal Mulai wajib diisi');
        return;
    }
    if (!hariKerja) {
        alert('Hari Kerja wajib dipilih');
        return;
    }
    if (!jamMasuk) {
        alert('Jam Masuk wajib diisi');
        return;
    }
    if (!jamPulang) {
        alert('Jam Pulang wajib diisi');
        return;
    }

    const payload = {
        shift: shift,
        penggantian_tlm1: penggantianTlm1 === '1',
        tgl_mulai: tglMulai,
        hari_kerja: hariKerja,
        jam_masuk: jamMasuk,
        jam_pulang: jamPulang,
    };

    fetch("{{ url_for('main.api_jam_kerja_save') }}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
    })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert(data.message);
                // reset form setelah sukses
                document.getElementById('selectShift').value = '';
                document.getElementById('selectPenggantianTlm1').value = '';
                document.getElementById('inputTglMulai').value = '';
                document.getElementById('seninKamis').checked = true;
                document.getElementById('inputJamMasuk').value = '';
                document.getElementById('inputJamPulang').value = '';
            } else {
                alert('Gagal: ' + data.message);
            }
        })
        .catch(err => {
            console.error(err);
            alert('Terjadi kesalahan saat menyimpan data.');
        });
});
</script>
{% endblock %}
