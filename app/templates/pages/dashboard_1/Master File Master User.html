<!-- pages/dashboard_1/Master File Master User.html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- User Account{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('main.view_master_user') }}">User Account</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="container-fluid">
            <div class="card mb-4 shadow-sm" style="border-radius: 10px; overflow: hidden; border: none;">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0">
                        <i class="ti ti-calendar-plus me-2"></i> Master User HRIS
                    </h6>

                    <div class="header-actions">
                        <button class="btn p-0 border-0 bg-transparent shadow-none d-md-none" type="button"
                            data-bs-toggle="collapse" data-bs-target="#headerIconsCollapse">
                            <i class="bi bi-three-dots-vertical" style="font-size: 1.5rem; color: #333;"></i>
                        </button>

                        <div class="collapse d-md-flex align-items-center" id="headerIconsCollapse">
                            <div class="header-icons-wrapper d-flex gap-3 p-2 p-md-0 mt-2 mt-md-0">
                                <a href="{{ url_for('main.view_cari_user_account') }}"
                                    class="btn p-0 border-0 bg-transparent shadow-none text-decoration-none">
                                    <i class="bi bi-search" style="color: #333; font-size: 1.1rem;"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body p-4">
                    <div class="row mb-4 align-items-center">
                        <label class="col-md-2 fw-bold text-dark">NIP</label>
                        <div class="col-md-10 d-flex gap-2 flex-wrap">
                            <div class="input-group" style="max-width: 320px;">
                                <input type="text" class="form-control bg-white" placeholder="NIP Pegawai">
                                <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
                            </div>
                            <button class="btn btn-info text-white px-3 fw-bold"
                                style="background-color: #4fd1c5; border: none;">
                                <i class="bi bi-search me-1"></i> CARI PEG.
                            </button>
                            <button class="btn btn-light border px-3">
                                <i class="bi bi-arrow-clockwise me-1"></i> REFRESH
                            </button>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <label class="col-md-2 fw-bold text-dark">Nama</label>
                        <div class="col-md-10">
                            <div class="border-bottom py-2 text-primary" style="min-height: 38px;">-</div>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <label class="col-md-2 fw-bold text-dark">Level</label>
                        <div class="col-md-4">
                            <div class="input-group">
                                <select class="form-select">
                                    <option value="operator">Operator</option>
                                    <option value="admin">Admin</option>
                                </select>
                                <span class="input-group-text bg-light"><i
                                        class="bi bi-diagram-3 text-muted"></i></span>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <label class="col-md-2 fw-bold text-dark">Khusus Operator</label>
                        <div class="col-md-10">
                            <div class="table-responsive border" style="border-radius: 5px;">
                                <div class="table-responsive">
                                    <table class="table table-bordered table-striped text-center align-middle">
                                        <thead style="background:#EB6831;">
                                            <tr>
                                                <th style="color:white; vertical-align: middle;">Nama</th>
                                                <th style="color:white; vertical-align: middle;">Type</th>
                                                <th style="color:white; vertical-align: middle;">Isi Akses</th>
                                                <th style="color:white; vertical-align: middle;">Type Akses</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td colspan="4" style="vertical-align: middle; padding: 20px;">
                                                    No records to display.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <label class="col-md-2 fw-bold text-dark">Foto</label>
                        <div class="col-md-10 d-flex align-items-start gap-4 flex-wrap">
                            <div class="border p-1 bg-white shadow-sm" style="width: 140px; height: 170px;">
                                <div class="w-100 h-100 border border-dashed d-flex align-items-center justify-content-center text-center p-2 text-muted"
                                    style="font-size: 10px; background: #fafafa;">
                                    No picture available
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <span class="fw-bold small">File foto <i class="bi bi-image text-muted"></i></span>
                                <div class="input-group" style="width: 250px;">
                                    <input type="text" class="form-control form-control-sm" readonly>
                                    <button class="btn btn-sm btn-light border">Select</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}

{% endblock %}
