{% extends "base.html" %}

{% block title %}Edit Karyawan - SAR Surabaya{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h2>Edit Data Karyawan</h2>
    </div>

    <div class="form-container">
        <form method="POST" action="{{ url_for('admin.edit_employee', id=employee.id) }}">
            <div class="form-grid">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" value="{{ employee.username }}" disabled>
                    <small class="text-muted">Username tidak dapat diubah</small>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" value="{{ employee.email }}" required>
                </div>
                
                <div class="form-group">
                    <label for="full_name">Nama Lengkap *</label>
                    <input type="text" id="full_name" name="full_name" value="{{ employee.full_name }}" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password Baru</label>
                    <input type="password" id="password" name="password">
                    <small class="text-muted">Kosongkan jika tidak ingin mengubah password</small>
                </div>
                
                <div class="form-group">
                    <label for="position">Jabatan</label>
                    <input type="text" id="position" name="position" value="{{ employee.position or '' }}">
                </div>
                
                <div class="form-group">
                    <label for="department">Departemen</label>
                    <input type="text" id="department" name="department" value="{{ employee.department or '' }}">
                </div>
                
                <div class="form-group">
                    <label for="phone">Telepon</label>
                    <input type="tel" id="phone" name="phone" value="{{ employee.phone or '' }}">
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="is_active" {% if employee.is_active %}checked{% endif %}>
                        Akun Aktif
                    </label>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                <a href="{{ url_for('admin.employees') }}" class="btn btn-secondary">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
