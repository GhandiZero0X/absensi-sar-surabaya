<!-- pages/dashboard_1/Master File Master Potongan.html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- Potongan{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="Master File Master Potongan.html">Master Potongan</a></li>
                <li class="breadcrumb-item">Edit</li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0">
                        <i class="ti ti-cash me-2"></i> Master Potongan
                    </h6>

                    <div class="header-actions">
                        <button class="btn p-0 border-0 bg-transparent shadow-none d-md-none" type="button"
                            data-bs-toggle="collapse" data-bs-target="#headerIconsCollapse">
                            <i class="bi bi-three-dots-vertical" style="font-size: 1.5rem; color: #333;"></i>
                        </button>

                        <div class="collapse d-md-flex align-items-center" id="headerIconsCollapse">
                            <div class="header-icons-wrapper d-flex gap-3 p-2 p-md-0 mt-2 mt-md-0">
                                <a href="Cari Master Potongan.html"
                                    class="btn p-0 border-0 bg-transparent shadow-none text-decoration-none">
                                    <i class="bi bi-search" style="color: #333; font-size: 1.1rem;"></i>
                                </a>

                                <button class="btn p-0 border-0 bg-transparent shadow-none">
                                    <i class="bi bi-file-earmark-plus" style="color: #0d6efd; font-size: 1.2rem;"></i>
                                </button>
                                <button class="btn p-0 border-0 bg-transparent shadow-none">
                                    <i class="bi bi-save" style="color: #198754; font-size: 1.2rem;"></i>
                                </button>

                                <button class="btn p-0 border-0 bg-transparent shadow-none">
                                    <i class="bi bi-trash" style="color: #dc3545; font-size: 1.2rem;"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Kategori</label>
                            <div class="col-md-7">
                                <select class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih Kategori</option>
                                    <option>Cuti</option>
                                    <option>Dinas Luar</option>
                                    <option>Hukuman</option>
                                    <option>Izin</option>
                                    <option>PSW</option>
                                    <option>Sakit</option>
                                    <option>TLM</option>
                                    <option>Tidak Absen</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Tingkat</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Diskripsi</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Potongan
                                (%)</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Bukti
                                Pendukung</label>
                            <div class="col-md-7">
                                <select class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    <option>Ada</option>
                                    <option>Tidak Ada</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Tanggal</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center mb-2">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 fw-bold">Range</label>

                            <div class="col-md-7 d-flex align-items-center gap-2">

                                <!-- Input kiri -->
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                </div>

                                <!-- s/d di luar -->
                                <span class="fw-bold text-muted" style="white-space: nowrap;">
                                    s/d
                                </span>

                                <!-- Input kanan -->
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}

{% endblock %}
