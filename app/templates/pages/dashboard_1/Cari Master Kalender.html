{% extends "layout/baseDashboard1.html" %}

{% block title %}- Kalender{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="Master File Master Kalender.html">Create Master Kalender</a>
                </li>
                <li class="breadcrumb-item">Cari Master Kalender</li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0"><i class="bi bi-search me-2"></i> Cari Kalender</h6>
                    <a href="Master File Master Kalender.html" class="btn-close-custom">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>

                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Bulan - Tahun</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="date" class="form-control-sm border w-100" style="outline: none;">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                            <button class="btn-refresh-custom ms-md-auto mt-2 mt-md-0 w-mobile-100">
                                <i class="bi bi-arrow-clockwise"></i> Refresh
                            </button>
                        </div>
                        <!-- TABLE -->
                        <div class="table-responsive">
                            <table class="table table-bordered table-striped text-center align-middle">
                                <thead style="background:#EB6831;">
                                    <tr>
                                        <th style="color:white; vertical-align: middle;">No</th>
                                        <th style="color:white; vertical-align: middle;">Tanggal</th>
                                        <th style="color:white; vertical-align: middle;">Isi Libur</th>
                                        <th style="color:white; vertical-align: middle;">Keterangan</th>
                                        <th style="color:white; vertical-align: middle;">Updated</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="5" style="vertical-align: middle; padding: 20px;">No records to
                                            display.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}

{% endblock %}
