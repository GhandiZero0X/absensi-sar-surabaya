<!DOCTYPE html>
<html lang="zxx">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Portal Internal Basarnas Surabaya untuk mendukung administrasi, kepegawaian, operasional, dan layanan internal pegawai.">
    <meta name="keywords" content="Basarnas, Basarnas Surabaya, Portal Internal, Kepegawaian, Operasional SAR">
    <title>Dashboard {% block title %}{% endblock %}</title>
    
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='static_dashboard_2/assets/images/logo1.png') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='static_dashboard_2/assets/css/bootstrap.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='static_dashboard_2/assets/vendors/css/vendors.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='static_dashboard_2/assets/vendors/css/select2.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='static_dashboard_2/assets/vendors/css/select2-theme.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='static_dashboard_2/assets/css/theme.min.css') }}">
</head>

<body>

    <!-- Header Start -->
    {% include 'partials/header.html' %}
    <!-- Header End -->

    <!-- Sidebar Start -->
    {% include 'partials/nav_dashboard2.html' %}
    <!-- Sidebar End -->

    <!-- Main Start -->
    <main class="nxl-container">
        {% block content %}
        {% endblock %}
    </main>
    <!-- Main End -->

    <!-- Main Start -->
    <script src="{{ url_for('static', filename='static_dashboard_2/assets/vendors/js/vendors.min.js') }}"></script>
    <script src="{{ url_for('static', filename='static_dashboard_2/assets/vendors/js/select2.min.js') }}"></script>
    <script src="{{ url_for('static', filename='static_dashboard_2/assets/vendors/js/select2-active.min.js') }}"></script>
    <script src="{{ url_for('static', filename='static_dashboard_2/assets/js/common-init.min.js') }}"></script>
    <script src="{{ url_for('static', filename='static_dashboard_2/assets/js/theme-customizer-init.min.js') }}"></script>
    {% block script %}
    {% endblock %}
    </body>

</html>
