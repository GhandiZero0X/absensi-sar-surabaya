<!-- pages/dashboard_1/Master File Master Jabatan.html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- Jabatan{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('main.view_master_jabatan') }}">Master Jabatan</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0">
                        <i class="feather-award me-2"></i> Master Jabatan
                    </h6>

                    <div class="header-actions">
                        <button class="btn p-0 border-0 bg-transparent shadow-none d-md-none" type="button"
                            data-bs-toggle="collapse" data-bs-target="#headerIconsCollapse">
                            <i class="bi bi-three-dots-vertical" style="font-size: 1.5rem; color: #333;"></i>
                        </button>

                        <div class="collapse d-md-flex align-items-center" id="headerIconsCollapse">
                            <div class="header-icons-wrapper d-flex gap-3 p-2 p-md-0 mt-2 mt-md-0">
                                <a href="{{ url_for('main.view_cari_master_jabatan') }}"
                                    class="btn p-0 border-0 bg-transparent shadow-none text-decoration-none">
                                    <i class="bi bi-search" style="color: #333; font-size: 1.1rem;"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-3">
                        <!-- Dropdown Group Jabatan: diisi dari server, tersimpan sebagai <select> -->
                        <div class="col-12 d-md-flex align-items-center mb-3">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Group jabatan</label>
                            <div class="col-md-7">
                                <select id="selectGroupJabatan" class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    {% for g in group_jabatan_list %}
                                    <option value="{{ g.GROUP_JABATAN_ID }}">{{ g.GROUP_JABATAN_ID }} - {{ g.NAMA_GROUP_JABATAN }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <!-- Dropdown SubGroup Jabatan: diisi dari server -->
                        <div class="col-12 d-md-flex align-items-center mb-3">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">SubGroup Jabatan</label>
                            <div class="col-md-7">
                                <select id="selectSubGroupJabatan" class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    {% for sg in sub_group_jabatan_list %}
                                    <option value="{{ sg.SUB_GROUP_JABATAN_ID }}">{{ sg.SUB_GROUP_JABATAN_ID }} - {{ sg.NAMA_SUB_GROUP_JABATAN }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Jabatan ID</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="number" id="inputJabatanId" class="form-control-sm border w-100 text-end" min="0" step="1" value="0">
                                    <span class="icon-append"><i class="bi bi-sort-numeric-down"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Nama Jabatan</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" id="inputNamaJabatan" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Parent Jabatan ID</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="number" id="inputParentJabatanId" class="form-control-sm border w-100 text-end" min="0" step="1" value="0">
                                    <span class="icon-append"><i class="bi bi-sort-numeric-down"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Level Jabatan</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="number" id="inputLevelJabatan" class="form-control-sm border w-100 text-end" min="0" step="1" value="0">
                                    <span class="icon-append"><i class="bi bi-sort-numeric-down"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Type</label>
                            <div class="col-md-7">
                                <select id="selectType" class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    <option value="FT">FT</option>
                                    <option value="FU">FU</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Isi Aktif</label>
                            <div class="col-md-7">
                                <select id="selectIsAktif" class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    <option value="1">Aktif</option>
                                    <option value="0">Non Aktif</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-flex justify-content-center mt-3">
                            <button type="button" id="btnSimpanJabatan" class="btn btn-orange-figma px-4">
                                <i class="bi bi-save me-1"></i>Simpan
                            </button>
                        </div>

                    </div>
                </div>

            </div>
            <div class="card mb-4 filter-card">
                <div class="card-header-customm">
                    <h6 class="mb-0">Item Kegiatan</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="table-responsive">
                            <table class="table table-bordered table-striped text-center align-middle">
                                <thead style="background:#EB6831;">
                                    <tr>
                                        <th style="color:white; vertical-align: middle;">ID Job</th>
                                        <th style="color:white; vertical-align: middle;">Item ID</th>
                                        <th style="color:white; vertical-align: middle;">Deskripsi</th>
                                        <th style="color:white; vertical-align: middle;">AK</th>
                                        <th style="color:white; vertical-align: middle;">Type</th>
                                        <th style="color:white; vertical-align: middle;">Unsur</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="6" style="vertical-align: middle; padding: 20px;">No
                                            records to display.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
document.getElementById('btnSimpanJabatan').addEventListener('click', function () {
    const groupJabatanId = document.getElementById('selectGroupJabatan').value;
    const subGroupJabatanId = document.getElementById('selectSubGroupJabatan').value;
    const jabatanId = document.getElementById('inputJabatanId').value;
    const namaJabatan = document.getElementById('inputNamaJabatan').value.trim();
    const parentJabatanId = document.getElementById('inputParentJabatanId').value;
    const levelJabatan = document.getElementById('inputLevelJabatan').value;
    const typeJabatan = document.getElementById('selectType').value;
    const isAktif = document.getElementById('selectIsAktif').value;

    if (!groupJabatanId) { alert('Group Jabatan wajib dipilih'); return; }
    if (!subGroupJabatanId) { alert('SubGroup Jabatan wajib dipilih'); return; }
    if (!jabatanId) { alert('Jabatan ID wajib diisi'); return; }
    if (!namaJabatan) { alert('Nama Jabatan wajib diisi'); return; }
    if (levelJabatan === '') { alert('Level Jabatan wajib diisi'); return; }
    if (!typeJabatan) { alert('Type wajib dipilih'); return; }
    if (isAktif === '') { alert('Isi Aktif wajib dipilih'); return; }

    const payload = {
        group_jabatan_id: groupJabatanId,
        sub_group_jabatan_id: subGroupJabatanId,
        jabatan_id: jabatanId,
        nama_jabatan: namaJabatan,
        parent_jabatan_id: parentJabatanId,
        level_jabatan: levelJabatan,
        type_jabatan: typeJabatan,
        is_aktif: isAktif === '1',
    };

    fetch("{{ url_for('main.api_jabatan_save') }}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
    })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert(data.message);
                document.getElementById('selectGroupJabatan').value = '';
                document.getElementById('selectSubGroupJabatan').value = '';
                document.getElementById('inputJabatanId').value = '0';
                document.getElementById('inputNamaJabatan').value = '';
                document.getElementById('inputParentJabatanId').value = '0';
                document.getElementById('inputLevelJabatan').value = '0';
                document.getElementById('selectType').value = '';
                document.getElementById('selectIsAktif').value = '';
            } else {
                alert('Gagal: ' + data.message);
            }
        })
        .catch(err => {
            console.error(err);
            alert('Terjadi kesalahan saat menyimpan data.');
        });
});
</script>
{% endblock %}
