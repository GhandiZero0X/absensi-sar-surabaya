<!-- pages/dashboard_1/Master File Master Tunkin Class .html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- Tunkin/Class{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('main.view_master_tunkin_class') }}">Master Tunkin/Class</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0">
                        <i class="ti ti-brand-redhat me-2"></i> Master Tunkin/Class
                    </h6>

                    <div class="header-actions">
                        <button class="btn p-0 border-0 bg-transparent shadow-none d-md-none" type="button"
                            data-bs-toggle="collapse" data-bs-target="#headerIconsCollapse">
                            <i class="bi bi-three-dots-vertical" style="font-size: 1.5rem; color: #333;"></i>
                        </button>

                        <div class="collapse d-md-flex align-items-center" id="headerIconsCollapse">
                            <div class="header-icons-wrapper d-flex gap-3 p-2 p-md-0 mt-2 mt-md-0">
                                <a href="{{ url_for('main.view_cari_master_tunkin_class') }}"
                                    class="btn p-0 border-0 bg-transparent shadow-none text-decoration-none">
                                    <i class="bi bi-search" style="color: #333; font-size: 1.1rem;"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Tanggal</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" id="inputTanggal" class="form-control-sm border w-100" placeholder="YYYY-MM-DD">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Class</label>
                            <div class="col-md-7">
                                <select id="selectClass" class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    <option>1</option>
                                    <option>2</option>
                                    <option>3</option>
                                    <option>4</option>
                                    <option>5</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Tunjangan</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" id="inputTunjangan" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">No Surat</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" id="inputNoSurat" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                            <button type="button" id="btnSimpanTunkinClass" class="btn btn-orange-figma px-4 ms-md-3 mt-2 mt-md-0" style="white-space: nowrap;">
                                <i class="bi bi-save me-1"></i>Simpan
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
document.getElementById('btnSimpanTunkinClass').addEventListener('click', function () {
    const classId   = document.getElementById('selectClass').value;
    const tunjangan = document.getElementById('inputTunjangan').value.trim();
    const tglMulai  = document.getElementById('inputTanggal').value.trim();
    const noSurat   = document.getElementById('inputNoSurat').value.trim();

    if (!classId) {
        alert('Class wajib dipilih');
        return;
    }
    if (!tunjangan) {
        alert('Tunjangan wajib diisi');
        return;
    }
    if (!noSurat) {
        alert('No Surat wajib diisi');
        return;
    }

    const payload = {
        class_id: classId,
        tunjangan: tunjangan,
        tgl_mulai: tglMulai || null,
        dokreff: noSurat,
    };

    fetch("{{ url_for('main.api_tunkin_class_save') }}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
    })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert(data.message);
                // reset form setelah sukses
                document.getElementById('selectClass').value = '';
                document.getElementById('inputTunjangan').value = '';
                document.getElementById('inputTanggal').value = '';
                document.getElementById('inputNoSurat').value = '';
            } else {
                alert('Gagal: ' + data.message);
            }
        })
        .catch(err => {
            console.error(err);
            alert('Terjadi kesalahan saat menyimpan data.');
        });
});
</script>
{% endblock %}
