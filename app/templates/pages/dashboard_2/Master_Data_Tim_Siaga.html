<!-- pages/dashboard_2/Master_Data_Tim_Siaga.html -->
{% extends "layout/baseDashboard2.html" %}

{% block title %}- Tim Siaga{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master Data</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="Master_Data_Tim_Siaga.html">Tim Siaga</a></li>
                <li class="breadcrumb-item">Edit</li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">
                        <i class="bi bi-people me-2"></i> Master Data Siaga
                    </h6>

                    <div class="header-actions">
                        <button class="btn p-0 border-0 bg-transparent shadow-none d-md-none" type="button"
                            data-bs-toggle="collapse" data-bs-target="#headerIconsCollapse">
                            <i class="bi bi-three-dots-vertical" style="font-size: 1.5rem; color: #333;"></i>
                        </button>

                        <div class="collapse d-md-flex align-items-center" id="headerIconsCollapse">
                            <div class="header-icons-wrapper d-flex gap-3 p-2 p-md-0 mt-2 mt-md-0">
                                <a href="Cari_Data_Tim_Siaga.html"
                                    class="btn p-0 border-0 bg-transparent shadow-none text-decoration-none">
                                    <i class="bi bi-search" style="color: #333; font-size: 1.1rem;"></i>
                                </a>

                                <button class="btn p-0 border-0 bg-transparent shadow-none">
                                    <i class="bi bi-file-earmark-plus" style="color: #0d6efd; font-size: 1.2rem;"></i>
                                </button>

                                <button class="btn p-0 border-0 bg-transparent shadow-none">
                                    <i class="bi bi-save" style="color: #198754; font-size: 1.2rem;"></i>
                                </button>

                                <button class="btn p-0 border-0 bg-transparent shadow-none">
                                    <i class="bi bi-trash" style="color: #dc3545; font-size: 1.2rem;"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Periode</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Shift</label>
                            <div class="col-md-7">
                                <select class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih Shift</option>
                                    <option>Shift 1</option>
                                    <option>Shift 2</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Fungsional</label>
                            <div class="col-md-7">
                                <select class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih Fungsional</option>
                                    <option>Kom</option>
                                    <option>Medis</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">No Urut</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Nama TIM</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center mb-2">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Unit Kerja</label>
                            <div class="col-md-7">
                                <select class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih Unit Kerja</option>
                                    <option>Surabaya</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex">
                            <div class="col-md-3"></div>
                            <div class="col-md-7">
                                <div class="table-responsive">
                                    <table class="table table-bordered table-sm w-100">
                                        <thead class="table-light">
                                            <tr>
                                                <th style="width:40%">NIP</th>
                                                <th>Nama</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td colspan="2" class="text-center py-4 text-muted">No records to
                                                    display.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4 filter-card">
                <div class="card-header-customm">
                    <h6 class="mb-0">Add Anggota TIM</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Pegawai</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Peg. lintas TIM</label>
                            <div class="col-md-7">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="lintasTim">
                                </div>
                            </div>
                        </div>
                        <div class="col-12 d-md-flex">
                            <div class="col-md-3"></div>
                            <div class="col-md-3">
                                <button class="btn btn-primary w-100 py-2"><i class="bi bi-plus-circle me-2"></i> Insert
                                    Pegawai to table</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4 filter-card">
                <div class="card-header-customm">
                    <h6 class="mb-0">Save As Tim Siaga</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">ke Periode</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 d-md-flex">
                            <div class="col-md-3"></div>
                            <div class="col-md-1">
                                <button class="btn btn-primary w-100 py-2"><i class="bi bi-save me-2"></i> Save</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% endblock %}
