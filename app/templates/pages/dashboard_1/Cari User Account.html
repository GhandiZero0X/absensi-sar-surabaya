<!-- pages/dashboard_1/Cari User Account.html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- User Account{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('main.view_master_user') }}">User Account</a></li>
                <li class="breadcrumb-item">Cari User</li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="container-fluid">
            <div class="card mb-4 shadow-sm" style="border-radius: 10px; overflow: hidden; border: none;">
                <div class="card-header-custom d-flex justify-content-between align-items-center p-3"
                    style="background: #ffffff; border-bottom: 1px solid #eee;">
                    <h6 class="mb-0"><i class="bi bi-search me-2"></i> Cari User</h6>
                    <a href="{{ url_for('main.view_master_user') }}" class="btn-close-custom">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>

                <div class="card-body p-4">
                    <div class="row mb-4 align-items-center">
                        <div
                            class="col-md-12 d-flex flex-column flex-md-row align-items-start align-items-md-center flex-wrap gap-2">
                            <label class="filter-label-wide">Filter</label>

                            <select class="form-select-sm border custom-select w-mobile-100">
                                <option>- Pilih Field -</option>
                                <option>Gol</option>
                                <option>Jabatan</option>
                                <option>Jenis Kelamin</option>
                                <option>Nama Peg</option>
                                <option>NIP</option>
                                <option>No Finger</option>
                                <option>Unit Kerja</option>
                            </select>

                            <div class="input-group-custom w-mobile-100">
                                <input type="text" class="form-control-sm border">
                                <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                            </div>

                            <span class="mx-md-2 fw-bold text-dan">Dan</span>

                            <select class="form-select-sm border custom-select w-mobile-100">
                                <option>- Pilih Field -</option>
                                <option>Gol</option>
                                <option>Jabatan</option>
                                <option>Jenis Kelamin</option>
                                <option>Nama Peg</option>
                                <option>NIP</option>
                                <option>No Finger</option>
                                <option>Unit Kerja</option>
                            </select>

                            <div class="input-group-custom w-mobile-100">
                                <input type="text" class="form-control-sm border">
                                <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                            </div>

                            <button class="btn-refresh-custom ms-md-auto mt-2 mt-md-0 w-mobile-100">
                                <i class="bi bi-arrow-clockwise"></i> Refresh
                            </button>
                        </div>
                        <p class="mb-1 fw-semibold text-dark" style="font-size: 12px;">
                            ㅤ
                        </p>
                        <div class="table-responsive">
                            <table class="table table-bordered table-striped text-center align-middle">
                                <thead style="background:#EB6831;">
                                    <tr>
                                        <th style="color:white; vertical-align: middle;">No</th>
                                        <th style="color:white; vertical-align: middle;">User ID</th>
                                        <th style="color:white; vertical-align: middle;">Nama</th>
                                        <th style="color:white; vertical-align: middle;">Jabatan</th>
                                        <th style="color:white; vertical-align: middle;">Level</th>
                                        <th style="color:white; vertical-align: middle;">UpdateBy</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="6" style="vertical-align: middle; padding: 20px;">No records to
                                            display.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% endblock %}
