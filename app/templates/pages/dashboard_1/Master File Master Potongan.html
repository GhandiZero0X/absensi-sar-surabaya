<!-- pages/dashboard_1/Master File Master Potongan.html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- Potongan{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Master File</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('main.view_master_potongan') }}">Master Potongan</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0">
                        <i class="ti ti-cash me-2"></i> Master Potongan
                    </h6>

                    <div class="header-actions">
                        <button class="btn p-0 border-0 bg-transparent shadow-none d-md-none" type="button"
                            data-bs-toggle="collapse" data-bs-target="#headerIconsCollapse">
                            <i class="bi bi-three-dots-vertical" style="font-size: 1.5rem; color: #333;"></i>
                        </button>

                        <div class="collapse d-md-flex align-items-center" id="headerIconsCollapse">
                            <div class="header-icons-wrapper d-flex gap-3 p-2 p-md-0 mt-2 mt-md-0">
                                <a href="{{ url_for('main.view_cari_master_potongan') }}"
                                    class="btn p-0 border-0 bg-transparent shadow-none text-decoration-none">
                                    <i class="bi bi-search" style="color: #333; font-size: 1.1rem;"></i>
                                </a>
                                <button class="btn p-0 border-0 bg-transparent shadow-none">
                                    <i class="bi bi-file-earmark-plus" style="color: #0d6efd; font-size: 1.2rem;"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Kategori</label>
                            <div class="col-md-7">
                                <select class="form-select-sm border custom-select w-100" id="inputKategori">
                                    <option value="">Pilih Kategori</option>
                                    <option>Cuti</option>
                                    <option>Dinas Luar</option>
                                    <option>Hukuman</option>
                                    <option>Izin</option>
                                    <option>PSW</option>
                                    <option>Sakit</option>
                                    <option>TLM</option>
                                    <option>Tidak Absen</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Tingkat</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100" id="inputTingkat">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Diskripsi</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100" id="inputDiskripsi">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Potongan (%)</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="number" step="0.01" min="0" max="100"
                                        class="form-control-sm border w-100" id="inputPersenPot">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Bukti Pendukung</label>
                            <div class="col-md-7">
                                <select class="form-select-sm border custom-select w-100" id="inputIsPendukung">
                                    <option value="">Pilih</option>
                                    <option value="Y">Ada</option>
                                    <option value="N">Tidak Ada</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Tanggal</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="date" class="form-control-sm border w-100" id="inputTglMulai">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-md-flex align-items-center mb-2">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 fw-bold">Range</label>

                            <div class="col-md-7 d-flex align-items-center gap-2 flex-wrap">
                                <div class="input-group-custom flex-grow-1" style="min-width: 100px;">
                                    <input type="number" step="0.01" class="form-control-sm border w-100" id="inputRangeAwal">
                                </div>

                                <span class="fw-bold text-muted" style="white-space: nowrap;">s/d</span>

                                <div class="input-group-custom flex-grow-1" style="min-width: 100px;">
                                    <input type="number" step="0.01" class="form-control-sm border w-100" id="inputRangeAkhir">
                                </div>
                            </div>
                            <button type="button" class="btn btn-orange-figma px-4 ms-md-3 mt-2 mt-md-0" style="white-space: nowrap;">
                                <i class="bi bi-save me-1"></i>Simpan
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const btnSave = document.getElementById('btnSimpanPotongan');

    const el = {
        kategori: document.getElementById('inputKategori'),
        tingkat: document.getElementById('inputTingkat'),
        diskripsi: document.getElementById('inputDiskripsi'),
        persenPot: document.getElementById('inputPersenPot'),
        isPendukung: document.getElementById('inputIsPendukung'),
        tglMulai: document.getElementById('inputTglMulai'),
        rangeAwal: document.getElementById('inputRangeAwal'),
        rangeAkhir: document.getElementById('inputRangeAkhir'),
    };

    function resetForm() {
        Object.values(el).forEach(input => { input.value = ''; });
    }

    async function savePotongan() {
        if (!el.kategori.value) {
            alert('Kategori wajib dipilih');
            return;
        }
        if (!el.diskripsi.value.trim()) {
            alert('Diskripsi wajib diisi');
            return;
        }
        if (!el.isPendukung.value) {
            alert('Bukti Pendukung wajib dipilih');
            return;
        }

        const payload = {
            kategori: el.kategori.value,
            tingkat: el.tingkat.value.trim(),
            diskripsi: el.diskripsi.value.trim(),
            persen_pot: el.persenPot.value || null,
            is_pendukung: el.isPendukung.value === 'Y',
            tgl_mulai: el.tglMulai.value || null,
            range_awal: el.rangeAwal.value || null,
            range_akhir: el.rangeAkhir.value || null,
        };

        btnSave.disabled = true;

        try {
            const res = await fetch('/api/potongan/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const json = await res.json();

            if (json.status !== 'success') {
                alert(json.message || 'Gagal menyimpan data potongan');
                return;
            }

            alert('Data potongan berhasil disimpan');
            resetForm();

        } catch (err) {
            console.error('Gagal menyimpan potongan:', err);
            alert('Terjadi kesalahan jaringan');
        } finally {
            btnSave.disabled = false;
        }
    }

    btnSave.addEventListener('click', savePotongan);
});
</script>
{% endblock %}
