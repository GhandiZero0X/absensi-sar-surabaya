<!-- pages/dashboard_1/Media Informasi.html -->
{% extends "layout/baseDashboard1.html" %}

{% block title %}- Inp Pengumuman{% endblock %}

{% block content %}
<div class="nxl-content">
    <div class="page-header">
        <div class="page-header-left d-flex align-items-center">
            <div class="page-header-title">
                <h5 class="m-b-10">Media Informasi</h5>
            </div>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('main.view_media_informasi') }}">Inp Pengumuman</a></li>
                <li class="breadcrumb-item">Runing Text</li>
            </ul>
        </div>
    </div>

    <div class="main-content master-siaga">
        <div class="container-fluid">
            <div class="card mb-4 filter-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center"
                    style="border-radius: 10px;">
                    <h6 class="mb-0">
                        <i class="ti ti-file-export me-2"></i>Media Informasi
                    </h6>
                </div>

                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 mt-2">
                            <style>
                                .btn-orange {
                                    background-color: #EB6831;
                                    color: white;
                                    border: 1px solid #1E1E1E;
                                }

                                .btn-orange:hover {
                                    background-color: #d95c28;
                                    color: white;
                                    border: 1px solid #1E1E1E;
                                }

                                .btn-orange-outline {
                                    border: 1px solid #1E1E1E;
                                    color: #1E1E1E;
                                    background: transparent;
                                }

                                .btn-orange-outline:hover {
                                    background-color: #EB6831;
                                    color: white;
                                    border: 1px solid #1E1E1E;
                                }
                            </style>

                            <div class="button-responsive-wrapper"
                                style="overflow-x: auto; white-space: nowrap; padding-bottom: 5px;">
                                <div class="btn-group d-inline-flex">
                                    <a href="{{ url_for('main.view_media_informasi') }}" class="btn btn-sm btn-orange">Runing Text</a>
                                    <a href="{{ url_for('main.view_media_informasi_detail') }}" class="btn btn-sm btn-orange-outline">Slide
                                        JPG</a>
                                </div>
                            </div>

                        </div>
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Diskripsi</label>
                            <div class="col-md-7">
                                <div class="input-group-custom w-100">
                                    <input type="text" class="form-control-sm border w-100">
                                    <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Tgl Mulai</label>
                            <div class="col-md-3">
                                <div class="input-group-custom w-100">
                                    <input type="date" class="form-control-sm border w-100" style="outline: none;">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                            <label class="col-md-1 text-md-center fw-bold mb-1 mb-md-0">Tgl Akhir</label>
                            <div class="col-md-3">
                                <div class="input-group-custom w-100">
                                    <input type="date" class="form-control-sm border w-100" style="outline: none;">
                                    <span class="icon-append"><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-1"></div>
                            <label class="col-md-2 text-md-start pe-md-4 fw-bold mb-1 mb-md-0">Isi Aktif</label>
                            <div class="col-md-7">
                                <select class="form-select-sm border custom-select w-100">
                                    <option value="">Pilih</option>
                                    <option>Y</option>
                                    <option>N</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 d-md-flex align-items-center">
                            <div class="col-md-3"></div>
                            <div class="col-md-9 d-flex align-items-center gap-2">
                                <button class="btn-refresh-custom mt-0 w-auto"
                                    style="background-color: #198754 !important;">
                                    <i class="ti ti-brand-telegram me-2"></i> Send
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="container-fluid">
            <div class="card mb-4 shadow-sm" style="border-radius: 10px; overflow: hidden; border: none;">
                <div class="card-header-custom d-flex justify-content-between align-items-center">
                    <h6 class="mb-0"><i class="bi bi-search me-2"></i> Cari Transaksi</h6>
                    <a href="Master File Master Potongan.html" class="btn-close-custom">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>

                <div class="card-body">
                    <div class="row">
                        <div
                            class="col-md-12 d-flex flex-column flex-md-row align-items-start align-items-md-center flex-wrap gap-2">
                            <label class="filter-label-wide">Filter</label>

                            <select class="form-select-sm border custom-select w-mobile-100">
                                <option>- Pilih Field -</option>
                            </select>

                            <div class="input-group-custom w-mobile-100">
                                <input type="text" class="form-control-sm border">
                                <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                            </div>

                            <span class="mx-md-2 fw-bold text-dan">Dan</span>

                            <select class="form-select-sm border custom-select w-mobile-100">
                                <option>- Pilih Field -</option>
                            </select>

                            <div class="input-group-custom w-mobile-100">
                                <input type="text" class="form-control-sm border">
                                <span class="icon-append"><i class="bi bi-pencil-fill"></i></span>
                            </div>

                            <button class="btn-refresh-custom ms-md-auto mt-2 mt-md-0 w-mobile-100">
                                <i class="bi bi-arrow-clockwise"></i> Refresh
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}

{% endblock %}
